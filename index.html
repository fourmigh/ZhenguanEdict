<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZhenguanEdict</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0a08; --bg2: #1a1410; --bg3: #2a221c;
  --text: #e8ddd0; --text-dim: #9a8a7a; --text-muted: #6a5a4a;
  --border: #3a322c; --accent: #C9A84C; --accent-dim: #8B7332;
  --card-bg: #1e1814; --shadow: rgba(0,0,0,0.5);
  --danger: #b22222; --success: #4a8c6f; --warning: #c9a84c;
  --radius: 6px; --font: 'Segoe UI','Noto Sans SC','PingFang SC',sans-serif;
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text); font: 14px/1.6 var(--font);
  display: flex; flex-direction: column; min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  flex-shrink: 0;
}
.header .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
.header .dynasty-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 12px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--accent-dim);
  font-size: 12px; color: var(--accent);
}
.header .dynasty-badge .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
}
.header .spacer { flex: 1; }
.header .clock { color: var(--text-dim); font-size: 12px; }
.chinese-clock { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.lang-btn, .header-btn {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px;
  font-family: var(--font); transition: all .2s;
}
.lang-btn:hover, .header-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.1); }
.body-wrap { display: flex; flex: 1; min-height: 0; }
.sidebar {
  width: 180px; flex-shrink: 0; background: var(--bg2);
  border-right: 1px solid var(--border); padding: 8px 0;
  display: flex; flex-direction: column;
}
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; cursor: pointer; color: var(--text-dim);
  font-size: 13px; transition: all .2s; border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(201,168,76,0.05); }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.main { flex: 1; padding: 20px; overflow-y: auto; min-width: 0; }
.view { display: none; }
.view.active { display: block; }
.view-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
.footer {
  padding: 8px 20px; background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--text-muted);
  flex-shrink: 0;
}
/* Dynasty cards */
.dynasty-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; }
.dynasty-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; cursor: pointer; transition: all .25s;
}
.dynasty-card:hover { border-color: var(--accent-dim); transform: translateY(-2px); }
.dynasty-card.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(201,168,76,0.15); }
.dynasty-card .dc-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.dynasty-card .dc-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.dynasty-card .dc-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
.dynasty-card .dc-swatch {
  width: 24px; height: 24px; border-radius: 50%; float: right;
  border: 2px solid var(--border);
}
/* Kanban */
.kanban { display: flex; padding-bottom: 8px; min-height: 200px; overflow-x: auto; }
.kanban-col {
  flex: 1 1 0; min-width: 0; position: relative;
  background: var(--bg2); padding: 8px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.kanban-col:first-child { border-left: 1px solid var(--border); border-radius: var(--radius) 0 0 var(--radius); }
.kanban-col:last-child { border-right: 1px solid var(--border); border-radius: 0 var(--radius) var(--radius) 0; }
.kanban-col + .kanban-col { border-left: none; }
.kanban-col + .kanban-col::before {
  content: '→'; position: absolute; left: -11px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; z-index: 1;
}
.kanban-col-header { font-size: 11px; font-weight: 600; color: var(--text-dim); padding: 4px 8px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.kanban-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 22px 8px 10px; margin-bottom: 6px; cursor: pointer; transition: all .15s;
  font-size: 12px; position: relative;
}
.kanban-card:hover { border-color: var(--accent-dim); }
.kanban-card .kc-title { font-weight: 500; margin-bottom: 2px; }
.kanban-card .kc-meta { font-size: 10px; color: var(--text-muted); }
.kanban-card .kc-del { position: absolute; top: 1px; right: 3px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 3px; opacity: 0; transition: opacity .15s; }
.kanban-card:hover .kc-del { opacity: 1; }
.kanban-card .kc-del:hover { color: var(--danger); }
/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.modal-close { float: right; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
.modal label { display: block; font-size: 12px; color: var(--text-dim); margin: 8px 0 4px; }
.modal input, .modal textarea, .modal select {
  width: 100%; padding: 6px 10px; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; font: 13px var(--font); outline: none;
}
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal textarea { min-height: 60px; resize: vertical; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
.btn {
  padding: 6px 16px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg3); color: var(--text); cursor: pointer; font: 12px var(--font);
  transition: all .2s; font-family: var(--font);
}
.btn:hover { border-color: var(--accent-dim); }
.btn-primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-sm { padding: 3px 10px; font-size: 11px; }
.btn-danger { border-color: var(--danger); color: var(--danger); }
/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th, .data-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th { color: var(--text-dim); font-weight: 500; }
.data-table tr:hover td { background: var(--bg3); }
.badge {
  display: inline-block; padding: 1px 8px; border-radius: 8px; font-size: 10px;
  font-weight: 500;
}
.badge-green { background: rgba(74,140,111,0.2); color: var(--success); }
.badge-red { background: rgba(178,34,34,0.2); color: var(--danger); }
.badge-yellow { background: rgba(201,168,76,0.2); color: var(--warning); }
.badge-gray { background: rgba(106,90,74,0.3); color: var(--text-muted); }
/* Memorial timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before {
  content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px;
  width: 1px; background: var(--border);
}
.tl-item { position: relative; padding: 6px 0 6px 12px; }
.tl-item::before {
  content: ''; position: absolute; left: -20px; top: 12px;
  width: 7px; height: 7px; border-radius: 50%; background: var(--accent-dim);
  border: 2px solid var(--bg);
}
.tl-item .tl-time { font-size: 10px; color: var(--text-muted); }
.tl-item .tl-action { font-size: 12px; font-weight: 500; }
.tl-item .tl-detail { font-size: 11px; color: var(--text-dim); }
/* Toolbar */
.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.toolbar .filter-input {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: var(--radius); font: 12px var(--font);
  outline: none;
}
.toolbar .filter-input:focus { border-color: var(--accent); }
/* Empty state */
.empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
/* toast */
.toast {
  position: fixed; bottom: 60px; right: 20px; z-index: 200;
  background: var(--bg3); border: 1px solid var(--accent-dim); border-radius: var(--radius);
  padding: 10px 16px; font-size: 12px; color: var(--text);
  opacity: 0; transform: translateY(10px); transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
/* Transition modal states list */
.transition-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.transition-list .btn { flex: 1; min-width: 80px; text-align: center; }
/* Agent form */
#agentFormTable tr.regdone { opacity: 0.45; }
#agentFormTable tr.regdone td { border-bottom-color: transparent; }
#batchRegisterBtn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span id="edictName">敕</span> ZhenguanEdict</div>
  <div class="dynasty-badge" id="dynastyBadge">
    <span class="dot" id="dynastyDot"></span>
    <span id="dynastyLabel">隋唐</span>
  </div>
  <div class="spacer"></div>
  <div style="text-align:right;font-size:12px">
    <span class="clock" id="clock"></span>
    <div class="chinese-clock" id="chineseClock"></div>
  </div>
  <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中</button>
  <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
</div>

<div class="body-wrap">
  <div class="sidebar">
    <div class="nav-item active" data-view="tasks" onclick="switchView('tasks')">
      <span class="icon">&#x1F4CB;</span> <span data-lang="nav_tasks">旨意看板</span>
    </div>
    <div class="nav-item" data-view="dynasties" onclick="switchView('dynasties')">
      <span class="icon">&#x1F3F0;</span> <span data-lang="nav_dynasties">朝代切换</span>
    </div>
    <div class="nav-item" data-view="memorials" onclick="switchView('memorials')">
      <span class="icon">&#x1F4DC;</span> <span data-lang="nav_memorials">奏折阁</span>
    </div>
    <div class="nav-item" data-view="agents" onclick="switchView('agents')">
      <span class="icon">&#x1F465;</span> <span data-lang="nav_agents">官员总览</span>
    </div>
  </div>

  <div class="main">
    <!-- Dynasties view -->
    <div class="view active" id="view-dynasties">
      <div class="view-title" data-lang="title_dynasties">朝代切换</div>
      <div class="dynasty-grid" id="dynastyGrid"></div>
    </div>

    <!-- Tasks view -->
    <div class="view" id="view-tasks">
      <div class="view-title" data-lang="title_tasks">旨意看板</div>
      <div class="toolbar">
        <button class="btn btn-primary" onclick="openCreateTask()">&#x2795; <span data-lang="new_task">新建任务</span></button>
        <select class="filter-input" id="filterState" onchange="loadTasks()">
          <option value="" data-lang-all="filter_all">全部状态</option>
          <option value="new">new</option>
          <option value="pending">pending</option>
          <option value="planning">planning</option>
          <option value="reviewing">reviewing</option>
          <option value="dispatching">dispatching</option>
          <option value="executing">executing</option>
          <option value="validating">validating</option>
          <option value="completed">completed</option>
        </select>
      </div>
      <div class="kanban" id="kanban"></div>
    </div>

    <!-- Memorials view -->
    <div class="view" id="view-memorials">
      <div class="view-title" data-lang="title_memorials">奏折阁</div>
      <div class="toolbar">
        <select class="filter-input" id="memorialFilter" onchange="loadMemorials()">
          <option value="" data-lang-all="filter_all_dynasty">全部朝代</option>
        </select>
      </div>
      <div id="memorialList"></div>
    </div>

    <!-- Agents view -->
    <div class="view" id="view-agents">
      <div class="view-title" data-lang="title_agents">官员总览</div>
      <div class="toolbar">
        <button class="btn btn-primary" onclick="batchRegisterAgents()" id="batchRegisterBtn">&#x2795; <span data-lang="register_selected">批量注册</span></button>
        <button class="btn" onclick="loadAgents()">&#x21BB; <span data-lang="refresh">刷新</span></button>
        <span style="font-size:11px;color:var(--text-muted);margin-left:8px" id="agentCount"></span>
      </div>
      <div id="agentRegisterForm" style="margin-bottom:16px"></div>
      <div id="agentTable"></div>
    </div>
  </div>
</div>

<div class="footer">
  <span>ZhenguanEdict v0.1.0</span>
  <span id="footerStatus" data-lang="footer_status">引擎状态</span>
  <span id="footerCounts"></span>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modalTask">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalTask')">&times;</button>
    <div class="modal-title" data-lang="modal_create_task">创建新任务</div>
    <label data-lang="form_content">内容</label>
    <textarea id="taskContent" placeholder="" style="min-height:120px"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modalTask')" data-lang="cancel">取消</button>
      <button class="btn btn-primary" onclick="submitCreateTask()" data-lang="confirm">确认</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalTransition">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalTransition')">&times;</button>
    <div class="modal-title" data-lang="modal_transition">推进状态</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px" id="transitionTaskInfo"></div>
    <label data-lang="form_target_state">目标状态</label>
    <div class="transition-list" id="transitionList"></div>
    <label data-lang="form_reason">原因</label>
    <textarea id="transitionReason"></textarea>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modalTransition')" data-lang="cancel">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalMemorial">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalMemorial')">&times;</button>
    <div class="modal-title" data-lang="modal_memorial">奏折详情</div>
    <div id="memorialDetail"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
const LANG = { current: 'zh' };
const STR = {
  zh: {
    dynasty_current:'当前朝代',nav_tasks:'旨意看板',nav_dynasties:'朝代切换',
    nav_memorials:'奏折阁',nav_agents:'官员总览',title_tasks:'旨意看板',
    title_dynasties:'朝代切换',title_memorials:'奏折阁',title_agents:'官员总览',
    new_task:'新建任务',cancel:'取消',confirm:'确认',
    modal_create_task:'创建新任务',modal_transition:'推进状态',
    modal_memorial:'奏折详情',
    form_content:'内容',
    form_target_state:'目标状态',form_reason:'原因',form_role:'角色 ID',
    form_model_type:'模型类型',form_display_name:'显示名称',
    filter_all:'全部状态',filter_all_dynasty:'全部朝代',
    footer_status:'引擎状态',empty_tasks:'暂无任务',empty_memorials:'暂无奏折',
    empty_agents:'暂无 Agent',registered:'已注册',unregister:'注销',register_selected:'批量注册',form_representative:'代表人物',register:'注册',refresh:'刷新',no_roles_for_dynasty:'当前朝代无官员角色',running:'运行中',busy:'忙碌',idle:'空闲',
    tokens:'Token',tasks:'任务',agents:'Agent',memorials:'奏折',
    total:'共',items:'项',create_at:'创建于',transition_to:'转至',
    no_transitions:'无可流转状态',task_detail:'任务详情',
    task_created:'任务已创建',dynasty_switched:'已切换至',
    toast_created:'已创建',toast_switched:'已切换至',
  },
  en: {
    dynasty_current:'Current Dynasty',nav_tasks:'Task Board',nav_dynasties:'Dynasties',
    nav_memorials:'Memorials',nav_agents:'Agents',title_tasks:'Task Board',
    title_dynasties:'Dynasty Switch',title_memorials:'Memorial Archives',
    title_agents:'Agent Overview',new_task:'New Task',
    cancel:'Cancel',confirm:'Confirm',modal_create_task:'Create Task',
    modal_transition:'Transition State',modal_memorial:'Memorial Detail',
    form_content:'Content',
    form_target_state:'Target State',form_reason:'Reason',
    form_role:'Role ID',form_model_type:'Model Type',form_display_name:'Display Name',
    filter_all:'All States',filter_all_dynasty:'All Dynasties',
    footer_status:'Engine Status',empty_tasks:'No tasks',empty_memorials:'No memorials',
    empty_agents:'No agents',registered:'Registered',unregister:'Unregister',register_selected:'Batch Register',form_representative:'Representative',register:'Register',refresh:'Refresh',no_roles_for_dynasty:'No roles for current dynasty',running:'Running',busy:'Busy',idle:'Idle',
    tokens:'Tokens',tasks:'Tasks',agents:'Agents',memorials:'Memorials',
    total:'Total',items:'items',create_at:'Created at',transition_to:'To',
    no_transitions:'No transitions available',task_detail:'Task Detail',
    task_created:'Task created',dynasty_switched:'Switched to',
    toast_created:'Created',toast_switched:'Switched to',
  }
};

const DYNASTY_COLORS = {
  yanhuang:{accent:'#D4A84B',accent_dim:'#8B7332',bg:'#1a0e04',bg2:'#221810',bg3:'#32281c',border:'#4a3a28',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  xia:{accent:'#4A8C6F',accent_dim:'#2D5A3D',bg:'#04140a',bg2:'#0a1e12',bg3:'#122a1c',border:'#1c3828',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  shang:{accent:'#E8E0D0',accent_dim:'#A09888',bg:'#181612',bg2:'#201e1a',bg3:'#2c2a26',border:'#3e3c38',text:'#e8e0d0',text_dim:'#a09888',text_muted:'#70685c'},
  zhou:{accent:'#C23B22',accent_dim:'#8B1A1A',bg:'#1a0604',bg2:'#260e0a',bg3:'#341812',border:'#46221a',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  qin:{accent:'#7E8A9E',accent_dim:'#4A5568',bg:'#040618',bg2:'#0a0e22',bg3:'#141830',border:'#242842',text:'#b8bcd0',text_dim:'#6a7288',text_muted:'#4a4e5a'},
  han:{accent:'#B22222',accent_dim:'#8B0000',bg:'#1a0404',bg2:'#260e0a',bg3:'#341812',border:'#441e14',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  suitang:{accent:'#C9A84C',accent_dim:'#8B7332',bg:'#1a0e02',bg2:'#24180e',bg3:'#34281c',border:'#4a3a28',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  song:{accent:'#A82222',accent_dim:'#6B1010',bg:'#180606',bg2:'#220e0a',bg3:'#301812',border:'#401e16',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  ming:{accent:'#DC3023',accent_dim:'#A02010',bg:'#1a0804',bg2:'#26100a',bg3:'#341a12',border:'#482618',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
  qing:{accent:'#E8B830',accent_dim:'#B8860B',bg:'#1a1200',bg2:'#241c0e',bg3:'#30281a',border:'#443a26',text:'#e8ddd0',text_dim:'#9a8a7a',text_muted:'#6a5a4a'},
};

function t(key) { return STR[LANG.current][key] || key; }
function setLang(l) {
  LANG.current = l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  document.querySelectorAll('[data-lang]').forEach(el => {
    const k = el.dataset.lang; if (STR.zh[k]) { el.textContent = t(k); }
  });
  document.title = l==='zh' ? 'ZhenguanEdict' : 'ZhenguanEdict';
  updateClock();
}
function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString(LANG.current==='zh'?'zh-CN':'en-US',{hour12:false});
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }

// View switching
let currentView = 'dynasties';
function switchView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`.nav-item[data-view="${name}"]`).classList.add('active');
  if (name==='tasks') loadTasks();
  else if (name==='dynasties') loadDynasties();
  else if (name==='memorials') loadMemorials();
  else if (name==='agents') loadAgents();
}

// Dynasty color switching
function setDynastyColor(name) {
  const s = DYNASTY_COLORS[name] || DYNASTY_COLORS.suitang;
  const r = document.documentElement.style;
  r.setProperty('--accent', s.accent);
  r.setProperty('--accent-dim', s.accent_dim);
  r.setProperty('--bg', s.bg);
  r.setProperty('--bg2', s.bg2);
  r.setProperty('--bg3', s.bg3);
  r.setProperty('--border', s.border);
  r.setProperty('--text', s.text);
  r.setProperty('--text-dim', s.text_dim);
  r.setProperty('--text-muted', s.text_muted);
  document.getElementById('dynastyDot').style.background = s.accent;
}

// API helpers
async function api(method, path, body) {
  const opt = { method, headers:{'Content-Type':'application/json'} };
  if (body) opt.body = JSON.stringify(body);
  const r = await fetch(API + path, opt);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||r.statusText); }
  return r.json();
}

// Clock & Chinese calendar
const TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SHI_CHEN = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];
// 年上起月：正月天干 = 年天干决定，index 0-9 → 丙(2)戊(4)庚(6)壬(8)甲(0)
const MONTH_GAN_MAP = [2,4,6,8,0]; // 甲己→丙,乙庚→戊,丙辛→庚,丁壬→壬,戊癸→甲
// 日上起时：子时天干 = 日天干决定
const HOUR_GAN_MAP = [0,2,4,6,8]; // 甲己→甲,乙庚→丙,丙辛→戊,丁壬→庚,戊癸→壬
function chineseYear(y) {
  const g = (y - 4) % 10, z = (y - 4) % 12;
  return TIAN_GAN.at(g) + DI_ZHI.at(z) + '年';
}
function chineseMonth(y, m) {
  // m: 1-12 (month), fixed di-zhi: 寅=正月(1),卯=2,...,丑=12
  const monthZhi = (m + 1) % 12; // 1→2(寅), 2→3(卯)...12→0(丑)... wait
  // Actually: 正月(1)=寅(2), 二月(2)=卯(3), ..., 十一月(11)=子(0), 十二月(12)=丑(1)
  // Formula: (m + 1) % 12
  const zhiIdx = (m + 1) % 12;
  // year gan index determines gan of 寅月 (正月)
  const yearGan = (y - 4) % 10;
  const startGan = MONTH_GAN_MAP[yearGan % 5];
  const ganIdx = (startGan + (m - 1)) % 10;
  return '(' + TIAN_GAN[ganIdx] + DI_ZHI[zhiIdx] + '月)';
}
function chineseDay(now) {
  // anchor: 2024-01-01 = 甲辰日 (tg=0, dz=4)
  const anchor = new Date(2024,0,1);
  const diff = Math.round((now.getTime() - anchor.getTime()) / 86400000);
  const tg = ((0 + diff) % 10 + 10) % 10;
  const dz = ((4 + diff) % 12 + 12) % 12;
  return TIAN_GAN[tg] + DI_ZHI[dz] + '日';
}
function chineseHour(h) {
  return SHI_CHEN[Math.floor(((h + 1) % 24) / 2)];
  // 23→11(子), 0→0(子), 1→0(子), 2→1(丑), ... 21→10(亥), 22→11(子)
}
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleString(LANG.current==='zh'?'zh-CN':'en-US',{hour12:false});
  if (LANG.current === 'zh') {
    const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate(), h = now.getHours();
    document.getElementById('chineseClock').textContent =
      chineseYear(y) + ' ' + chineseMonth(y, m) + ' ' + chineseDay(now) + ' ' + chineseHour(h);
  } else {
    document.getElementById('chineseClock').textContent = '';
  }
}

// ============ DYNASTIES ============
async function loadDynasties() {
  const data = await api('GET','/api/dynasties');
  const cur = await api('GET','/api/dynasties/current');
  const g = document.getElementById('dynastyGrid');
  g.innerHTML = data.map(d => `
    <div class="dynasty-card${d.name===cur.name?' active':''}" onclick="switchDynasty('${d.name}')">
      <div class="dc-swatch" style="background:${d.color_scheme.accent}"></div>
      <div class="dc-name">${d.display_name}</div>
      <div class="dc-meta">${d.roles_count} roles</div>
      <div class="dc-desc">${d.description}</div>
    </div>`).join('');
}

async function switchDynasty(name) {
  const r = await api('POST','/api/dynasties/switch',{name});
  setDynastyColor(name);
  document.getElementById('dynastyLabel').textContent = r.display_name;
  document.getElementById('edictName').textContent = r.edict_name;
  toast(t('toast_switched') + ': ' + r.display_name);
  loadDynasties();
  loadStatus();
}

// ============ TASKS ============
async function loadTasks() {
  const state = document.getElementById('filterState').value;
  const q = state ? '?state='+state : '';
  const data = await api('GET','/api/tasks'+q);
  const groups = {};
  data.forEach(t => { if (!groups[t.state]) groups[t.state] = []; groups[t.state].push(t); });
  const order = ['new','pending','planning','reviewing','dispatching','executing','validating','completed'];
  const k = document.getElementById('kanban');
  k.innerHTML = order.map(st => {
    const items = groups[st] || [];
    return `<div class="kanban-col">
      <div class="kanban-col-header">${st} (${items.length})</div>
      ${items.length ? items.map(t => `<div class="kanban-card" onclick="openTransition('${t.task_id}')">
        <div class="kc-title">${t.title}</div>
        <div class="kc-meta">${fmtTime(t.created_at)}</div>
        <button class="kc-del" onclick="event.stopPropagation();deleteTask('${t.task_id}')" title="delete">&times;</button>
      </div>`).join('') : '<div class="empty-state" style="padding:12px;font-size:11px">-</div>'}
    </div>`;
  }).join('');
}

function openCreateTask() {
  document.getElementById('taskContent').value = '';
  openModal('modalTask');
}

async function submitCreateTask() {
  const content = document.getElementById('taskContent').value.trim();
  if (!content) return;
  const r = await api('POST','/api/tasks',{content});
  closeModal('modalTask');
  document.getElementById('taskContent').value = '';
  toast(t('toast_created') + ': ' + r.title);
  loadTasks(); loadStatus();
}

let _transitionTaskId = '';
async function openTransition(taskId) {
  _transitionTaskId = taskId;
  const task = await api('GET','/api/tasks/'+taskId);
  const cur = await api('GET','/api/dynasties/current');
  const trans = cur.state_machine.transitions.filter(t => t.from === task.state);
  document.getElementById('transitionTaskInfo').textContent = task.title + ' [' + task.state + ']';
  document.getElementById('transitionReason').value = '';
  const list = document.getElementById('transitionList');
  if (trans.length) {
    list.innerHTML = trans.map(t => `<button class="btn btn-primary btn-sm" onclick="doTransition('${t.to}')">${t.to}</button>`).join('');
  } else {
    list.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">-</span>';
  }
  openModal('modalTransition');
}

async function doTransition(target) {
  const reason = document.getElementById('transitionReason').value.trim();
  await api('POST','/api/tasks/'+_transitionTaskId+'/transition',{state:target,reason});
  closeModal('modalTransition');
  toast(target);
  loadTasks(); loadStatus();
}
async function deleteTask(taskId) {
  if (!confirm('确认删除任务？')) return;
  await api('DELETE','/api/tasks/'+taskId);
  toast('deleted: '+taskId);
  loadTasks(); loadStatus();
}

// ============ MEMORIALS ============
async function loadMemorials() {
  const dynasty = document.getElementById('memorialFilter').value;
  const q = dynasty ? '?dynasty='+dynasty : '';
  const data = await api('GET','/api/memorials'+q);
  const container = document.getElementById('memorialList');
  if (!data.length) { container.innerHTML = '<div class="empty-state">'+t('empty_memorials')+'</div>'; return; }
  container.innerHTML = data.map(m => `
    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer" onclick="openMemorial('${m.memorial_id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:500;font-size:13px">${m.task_title}</span>
        <span style="font-size:11px;color:var(--text-muted)">${m.dynasty}</span>
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">
        ${fmtTime(m.created_at)} · ${t('tokens')}: ${Object.values(m.total_tokens||{}).reduce((a,b)=>a+b,0)} · ${m.entries_count} ${t('items')}
      </div>
    </div>`).join('');
}

async function openMemorial(id) {
  const m = await api('GET','/api/memorials/'+id);
  const entries = m.entries || [];
  document.getElementById('memorialDetail').innerHTML = `
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">
      ${m.task_title} · ${m.dynasty} · ${fmtTime(m.created_at)}
    </div>
    ${entries.length ? '<div class="timeline">'+entries.map(e => `
      <div class="tl-item">
        <div class="tl-time">${fmtTime(e.timestamp)}</div>
        <div class="tl-action">${e.action}${e.decision?' → '+e.decision:''}</div>
        <div class="tl-detail">${e.actor_role} ${e.content||''} ${e.decision_reason?'('+e.decision_reason+')':''}</div>
        ${Object.keys(e.token_usage).length ? '<div class="tl-detail" style="font-size:10px">tokens: '+JSON.stringify(e.token_usage)+'</div>' : ''}
      </div>`).join('')+'</div>' : '<div class="empty-state">-</div>'}
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px">${t('tokens')}: ${Object.values(m.total_tokens||{}).reduce((a,b)=>a+b,0)}</div>`;
  openModal('modalMemorial');
}

// ============ AGENTS ============
async function loadAgents() {
  const cur = await api('GET','/api/dynasties/current');
  const roles = cur.roles || [];
  const agents = await api('GET','/api/agents');
  const existing = new Set(agents.map(a => a.role_id));
  const el = document.getElementById('agentRegisterForm');
  if (!roles.length) {
    el.innerHTML = '<div class="empty-state">'+t('no_roles_for_dynasty')+'</div>';
  } else {
    el.innerHTML = `<table class="data-table" id="agentFormTable">
      <tr><th style="width:32px"><input type="checkbox" id="selectAllRows" onchange="document.querySelectorAll('.row-select').forEach(c=>c.checked=this.checked)"></th>
      <th>${t('form_role')}</th><th>${t('form_representative')}</th><th>${t('form_model_type')}</th><th>${t('form_display_name')}</th><th style="width:80px">${t('register')}</th></tr>
      ${roles.map(r => {
        const a = existing.has(r.role_id);
        return `<tr data-role-id="${r.role_id}" data-model-type="${r.model_type||'lite'}" class="${a?'regdone':''}">
        <td>${a?'':`<input type="checkbox" class="row-select" checked>`}</td>
        <td>${r.display_name}</td>
        <td style="color:var(--text-dim);font-size:11px">${r.representative||'-'}</td>
        <td><span class="badge badge-gray">${r.model_type||'lite'}</span></td>
        <td><input class="filter-input row-display-name" value="${a?t('registered'):(r.representative||r.display_name)}" ${a?'disabled':''}></td>
        <td>${a?'<span style="font-size:10px;color:var(--text-muted)">✓</span>':`<button class="btn btn-sm" onclick="registerSingle(this)">${t('register')}</button>`}</td>
      </tr>`;
      }).join('')}</table>`;
    const n = roles.filter(r => !existing.has(r.role_id)).length;
    const btn = document.getElementById('batchRegisterBtn');
    btn.innerHTML = '&#x2795; <span data-lang="register_selected">'+t('register_selected')+'</span>'+(n?` (${n})`:'');
    btn.disabled = n===0;
  }
  document.getElementById('agentCount').textContent = t('registered')+': '+agents.length;
  renderAgentTable(agents);
  loadStatus();
}
function renderAgentTable(agents) {
  const el = document.getElementById('agentTable');
  if (!agents.length) { el.innerHTML = '<div class="empty-state">'+t('empty_agents')+'</div>'; return; }
  el.innerHTML = `<table class="data-table">
    <tr><th>ID</th><th>${t('form_role')}</th><th>${t('form_model_type')}</th><th>${t('footer_status')}</th><th>${t('tokens')}</th><th>${t('tasks')}</th><th style="width:60px"></th></tr>
    ${agents.map(a => `<tr>
      <td style="font-family:monospace;font-size:11px">${a.agent_id}</td>
      <td>${a.display_name||a.role_id}</td>
      <td><span class="badge badge-gray">${a.model_type}</span></td>
      <td><span class="badge ${a.is_busy?'badge-red':'badge-green'}">${a.is_busy?t('busy'):t('idle')}</span></td>
      <td>${a.total_tokens_consumed}</td>
      <td>${a.tasks_completed}</td>
      <td>${a.is_busy?'':`<button class="btn btn-sm btn-danger" onclick="unregisterAgent('${a.agent_id}','${a.display_name||a.role_id}')">${t('unregister')}</button>`}</td>
    </tr>`).join('')}
  </table>`;
}
function getFormData() {
  const items = [];
  document.querySelectorAll('#agentFormTable tr[data-role-id]').forEach(tr => {
    const cb = tr.querySelector('.row-select');
    if (!cb || !cb.checked) return;
    items.push({
      role_id: tr.dataset.roleId,
      model_type: tr.dataset.modelType,
      display_name: tr.querySelector('.row-display-name').value,
    });
  });
  return items;
}
async function registerSingle(btn) {
  const tr = btn.closest('tr');
  const data = {
    role_id: tr.dataset.roleId,
    model_type: tr.dataset.modelType,
    display_name: tr.querySelector('.row-display-name').value,
  };
  await api('POST','/api/agents',data);
  toast(t('register')+': '+data.role_id);
  loadAgents();
}
async function unregisterAgent(agentId, name) {
  if (!confirm(`确认注销 Agent「${name}」？`)) return;
  await api('DELETE','/api/agents/'+agentId);
  toast(t('unregister')+': '+name);
  loadAgents();
}
async function batchRegisterAgents() {
  const items = getFormData();
  if (!items.length) { toast(t('no_roles_for_dynasty')); return; }
  await api('PUT','/api/agents/batch',{agents:items});
  toast(t('register_selected')+': '+items.length);
  loadAgents();
}

// ============ STATUS ============
async function loadStatus() {
  const h = await api('GET','/api/health');
  document.getElementById('footerStatus').textContent = h.status + ' (' + (h.dynasty||'?') + ')';
  document.getElementById('footerCounts').textContent = `${t('tasks')}:${h.tasks_total} · ${t('agents')}:${h.agents_total}`;
}

// ============ SSE ============
function connectSSE() {
  const es = new EventSource(API + '/api/events');
  es.addEventListener('update', e => {
    try { const d = JSON.parse(e.data);
      if (d.type === 'dynasty_switched') { setDynastyColor(d.dynasty); }
      if (currentView==='tasks') loadTasks();
      else if (currentView==='dynasties') loadDynasties();
      else if (currentView==='memorials') loadMemorials();
      else if (currentView==='agents') loadAgents();
      loadStatus();
    } catch(_) {}
  });
  es.onerror = () => { setTimeout(connectSSE, 3000); };
}

// ============ INIT ============
async function init() {
  updateClock(); setInterval(updateClock, 1000);
  setLang('zh');
  setDynastyColor('suitang');
  try {
    const cur = await api('GET','/api/dynasties/current');
    setDynastyColor(cur.name);
    document.getElementById('dynastyLabel').textContent = cur.display_name;
    document.getElementById('edictName').textContent = cur.edict_name;
    const ds = await api('GET','/api/dynasties');
    const sel = document.getElementById('memorialFilter');
    ds.forEach(d => { const o = document.createElement('option'); o.value=d.name; o.textContent=d.display_name; sel.appendChild(o); });
  } catch(_) {}
  loadDynasties();
  loadStatus();
  connectSSE();
  switchView('tasks');
}
document.addEventListener('DOMContentLoaded', init);
</script>
